services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./biblioteca-backend
      dockerfile: Dockerfile
    env_file:
      - ./biblioteca-backend/.env
    ports:
      - "3001:3001"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./biblioteca-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:3001

volumes:
  mongo_data:
